<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <h1>Login</h1>
    <form action="/" class="gotomain"><button type="submit">To message board</button></form>
    <form action="/signup" method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="text" name="display_name" placeholder="Display Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="password" name="rep_pass" placeholder="Repeat password" required>
      <button type="submit">Sign up</button>
    </form>
    <form action="/login" class="signup"><p>Already have an account?</p><br><button type="submit">Log in</button></form>
  </body>
  </html>
